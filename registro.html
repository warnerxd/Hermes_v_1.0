<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Sistema de Gestión de Vehículos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0060c2 0%, #faf4ff 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #faf4ff;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            max-width: 500px;
            width: 100%;
        }

        .header {
            background: linear-gradient(135deg, #0060c2 0%, #6580d7 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #555;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1em;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            transition: all 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0060c2 0%, #6580d7 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1.05em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-weight: 500;
        }

        .alert-success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }

        .alert-error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }

        .link-section {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .link-section p {
            color: #666;
            margin-bottom: 10px;
        }

        .link {
            color: #667eea;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .link:hover {
            color: #0060c2;
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin-top: 10px;
        }

        .help-text {
            font-size: 0.75em;
            color: #888;
            margin-top: 5px;
            display: block;
        }

        @media (max-width: 600px) {
            .header {
                padding: 30px 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .content {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚚</h1>
            <h1>Crear Cuenta</h1>
            <p>Únete a nuestro sistema</p>
        </div>
        <div class="content">
            <div class="alert alert-success" id="alertSuccess"></div>
            <div class="alert alert-error" id="alertError"></div>

            <form id="registroForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" required placeholder="Tu nombre completo">
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="tu@email.com">
                </div>
                <div class="form-group">
                    <label for="telefono">Número de WhatsApp (código país + número)</label>
                    <input type="tel" id="telefono" required placeholder="ej: 573001234567">
                    <span class="help-text">Obligatorio para recuperar tu contraseña por WhatsApp</span>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
                </div>
                <div class="form-group">
                    <label for="proveedor">Proveedor</label>
                    <select id="proveedor" required>
                        <option value="">-- Seleccionar Proveedor --</option>
                    </select>
                    <small style="color: #999;">Cargando proveedores...</small>
                </div>
                <button type="submit">Crear Cuenta</button>
                <div class="loading" id="loading">Creando cuenta...</div>
            </form>

            <div class="link-section">
                <p>¿Ya tienes cuenta?</p>
                <a href="login.html" class="link">Inicia sesión aquí</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin;

        // Verificar si el usuario ya está logueado
        window.addEventListener('load', function() {
            const usuarioGuardado = localStorage.getItem('usuario');
            if (usuarioGuardado) {
                window.location.href = 'ver_vehiculos.html';
            }
            
            // Cargar proveedores
            cargarProveedores();
        });

        function cargarProveedores() {
            console.log('Cargando proveedores desde:', API_URL + '/proveedores');
            fetch(API_URL + '/proveedores')
                .then(r => {
                    console.log('Response status:', r.status);
                    return r.json();
                })
                .then(data => {
                    console.log('Datos recibidos:', data);
                    const select = document.getElementById('proveedor');
                    
                    if (!data || !data.proveedores || data.proveedores.length === 0) {
                        console.log('No hay proveedores o array vacío');
                        select.innerHTML = '<option value="">No hay proveedores disponibles</option>';
                        return;
                    }
                    
                    console.log('Proveedores encontrados:', data.proveedores.length);
                    let html = '<option value="">-- Seleccionar Proveedor --</option>';
                    data.proveedores.forEach(p => {
                        console.log('Agregando proveedor:', p.proveedor);
                        html += `<option value="${p.proveedor}">${p.proveedor}</option>`;
                    });
                    select.innerHTML = html;
                })
                .catch(e => {
                    console.error('Error al cargar proveedores:', e);
                    const select = document.getElementById('proveedor');
                    select.innerHTML = '<option value="">Error al cargar proveedores</option>';
                });
        }

        document.getElementById('registroForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const nombre = document.getElementById('nombre').value;
            const email = document.getElementById('email').value;
            const telefono = document.getElementById('telefono').value;
            const password = document.getElementById('password').value;
            const proveedor = document.getElementById('proveedor').value;

            // Validaciones básicas
            if (password.length < 6) {
                mostrarAlerta('❌ La contraseña debe tener al menos 6 caracteres', 'error');
                return;
            }

            if (!proveedor) {
                mostrarAlerta('❌ Debes seleccionar un proveedor', 'error');
                return;
            }

            if (!telefono || telefono.length < 10) {
                mostrarAlerta('❌ Ingresa un número de WhatsApp válido (código país + número, ej: 573001234567)', 'error');
                return;
            }

            document.getElementById('loading').style.display = 'block';

            fetch(API_URL + '/auth/registro', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    email, 
                    nombre, 
                    contraseña: password, 
                    proveedor,
                    telefono   // <-- nuevo campo
                })
            })
            .then(r => r.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                
                if (data.error) {
                    mostrarAlerta('❌ ' + data.error, 'error');
                } else {
                    mostrarAlerta('✅ Cuenta creada exitosamente. Redirigiendo...', 'success');
                    document.getElementById('registroForm').reset();
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            })
            .catch(e => {
                document.getElementById('loading').style.display = 'none';
                console.error(e);
                mostrarAlerta('❌ Error al registrar', 'error');
            });
        });

        function mostrarAlerta(mensaje, tipo) {
            const alertId = tipo === 'success' ? 'alertSuccess' : 'alertError';
            const alertElement = document.getElementById(alertId);
            alertElement.textContent = mensaje;
            alertElement.style.display = 'block';
            setTimeout(() => alertElement.style.display = 'none', 5000);
        }
    </script>
</body>
</html>
